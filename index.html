<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACREDICOM-FORMS </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="src/js/axios.min.js"></script>
    <script src="src/js/iconify.min.js"></script>
    <script src="src/js/sweetalert.min.js"></script>
    <link rel="stylesheet" href="src/css/sweetalert2.min.css">
    <link rel="stylesheet" href="src/css/main.css">

</head>
<body class="mt-5 mb-5 mx-1 px-4">
    <div id="app" class="container mx-auto bg-white rounded-lg shadow-lg p-6">
        <div class="max-w-full mx-auto">
            <div class="space-y-3">
                <header class="flex items-center justify-between mb-2 md:mb-1">
                    <img src="src/img/header.jpg" alt="Logo" class="w-full h-auto md:max-h-50">
                </header>
                <div class="space-y-2">
                    <p id="form-title" class="text-2xl md:text-3xl font-semibold text-[#00457C]  mb-4 p-2 rounded-lg">Nombre del formulario</p>
                    <p class="text-[#00457C] font-extrabold text-right font-semibold" id="form-number">Formulario 1/4</p>
                </div>

                <!-- User Info Card -->
                <div class="bg-blue-50 p-4 rounded-lg space-y-2">
                    <div class="flex items-center gap-2">
                        <svg class="w-5 h-5 text-[#00457C]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <span id="user-name" class="font-semibold text-[#00457C]"></span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2">
                            <svg class="w-5 h-5 text-[#00457C]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                            </svg>
                            <span id="user-id" class="text-[#00457C]"></span>
                        </div>
                        <div class="flex items-center gap-2">
                            <svg class="w-5 h-5 text-[#00457C]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <span id="user-location" class="text-[#00457C]"></span>
                        </div>
                    </div>
                </div>

                <!-- Sección de Preguntas -->
                <div id="question-section" class="space-y-4">
                    <!-- Aquí se renderizarán las preguntas dinámicamente -->
                </div>

                <!-- Sección de Firma -->
                <div id="signature-section" class="space-y-2">
                    <h2 class="text-[#00457C] font-medium">Área de firma</h2>
                    <div id="signature-container" class="relative w-full h-48 border-2 border-gray-300 rounded-lg user-select-none">
                        <canvas id="signature-pad" class="absolute left-0 top-0 w-full h-full"></canvas>
                        <button id="clear-signature" class="absolute top-2 right-2 text-gray-400">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    <button id="submit-form" class="w-full bg-[#00457C] text-white py-3 rounded-lg font-medium flex items-center justify-center hover:bg-[#003366] transition duration-200">
                        Siguiente
                    </button>
                    <button id="btn-anterior-signature" class="w-full bg-gray-500 text-white py-3 rounded-lg font-medium flex items-center justify-center hidden">
                        Anterior
                    </button>
                </div>

                <!-- Botones de Acción -->
                <div class="flex flex-col space-y-2 md:flex-row md:space-x-2">
                    <button id="btn-anterior" class="w-full bg-gray-500 text-white py-3 rounded-lg font-medium flex items-center justify-center hidden">
                        Anterior
                        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 12H5m0 0l7-7m-7 7l7 7" />
                        </svg>
                    </button>
                    <button id="btn-siguiente" class="w-full bg-[#00457C] text-white py-3 rounded-lg font-medium flex items-center justify-center">
                        Siguiente
                        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M5 12h14m0 0l-7-7m7 7l-7 7" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
<script type="module" src="./src/js/main.js"></script>
</html>
